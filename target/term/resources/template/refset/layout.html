<!-- Controller As : refsetCtrl as rs  -->
<div class="iui-wrapper" ng-controller="RefsetController as rs">
	<div class="loading-indicator" ng-if="rs.loading">
		<div class="spinner"></div>
	</div>
    <div class="iui-w-left">
        <!-- 왼쪽 사이드바 (레퍼런스세트 목록) -->
        <div class="iui-sidebar" ng-class="rs.isCollapsed ? 'expanded':''">
            <!-- 사이드바 컨테이너 -->
            <div class="iui-sb-container">
            	<md-content>
			        <md-tabs md-border-bottom>
			          <md-tab label="{{ 'international.edition' | translate }}">
			            <!-- Taxonomy 트리뷰 -->
						<div ng-controller="IntRefsetController as vm">
							<ul style="padding: 0">
								<li ng-repeat="node in vm.tree" ng-include="'resources/template/refset/treeexist.html'"></li>
							</ul>
						</div>
			          </md-tab>
			          <md-tab label="{{ 'infoclinic.edition' | translate }}">
			            <div ng-include="'resources/template/refset/user.html'"></div>
			          </md-tab>
			        </md-tabs>
			      </md-content>
            </div>
            <!-- 열기/닫기/핀 툴 -->
            <div class="iui-sb-tools">
            	<a class="expand-collapse-trigger" ng-click="rs.isCollapsed ? rs.expandSb():rs.collapseSb()"></a>
            </div>
            <!-- 스플리터 핸들 -->
            <div class="iui-sb-handle" ng-class="rs.isCollapsed ? 'expanded':''">
            	<div class="iui-sbh-highlight"></div>
            </div>
        </div>
    </div>
    <div id="re-main" class="iui-w-panel" ng-class="rs.isCollapsed ? 'expanded':''">
        <div id="re-panel" class="sd_panel" ng-class="rs.viewSrch ? '':'slave'">
	 		<!-- master_panel -->
	 		<div class="p_master v_col">
	 			<div ng-include="'resources/template/refset/search.html'"></div>
	 		</div>
	 		<!-- panel_splitter -->
	 		<div class="p_splitter v_col"></div>
	 		<!-- slave_panel -->
	 		<div class="p_slave v_col" ui-view></div>
 		</div>
    </div>
</div>
