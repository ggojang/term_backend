<div>
 	<div class="rs_head" style="background-color:#f5f5f5">
 		<div class="rs_head_toolbar btn-toolbar" role="toolbar">
 			<div class="btn-group pull-right" role="group" ng-if="m.release === 'user'">
 				<button class="btn btn-default btn-sm" ng-click="rs.viewSrch = m.setMode(!rs.viewSrch)" ng-bind="rs.viewSrch ? 'Exit':'Edit'"></button>
 			</div>
 			<div class="btn-group pull-right" role="group">
 				<button class="btn btn-default btn-sm" ng-model="m.viewProp" ng-click="m.viewProp ? m.showProp(false):null" uib-btn-checkbox>Properties</button>
 			</div>
 			
 			<div class="btn-group pull-right" role="group" ng-if="rs.viewSrch">
 				<button class="btn btn-default btn-sm" ng-click="">Save</button>
 				<button class="btn btn-default btn-sm" ng-click="">Load</button>
 				<button class="btn btn-default btn-sm" ng-click="">Delete</button>
 			</div>
 			
 			<div class="btn-group pull-right" role="group" ng-if="rs.viewSrch">
 				<button class="btn btn-primary btn-sm" ng-click="m.apply($event)">Apply</button>
 				<button class="btn btn-default btn-sm">Restore</button>
 			</div>
 		</div>
 	</div>
 	<div class="rs_head_titlebar">
		<span>{{ m.refset.id }} {{ m.refset.name }}</span>
		<!-- 멤버 수 <span class="label label-primary">123456</span> -->
	</div>
	
	<div id="re-m-panel" class="sd_panel" ng-class="m.viewProp ? '':'master'">
		<div class="p_master v_col" style="width:700px;">
			<md-content>
				<md-tabs md-border-bottom>
					<md-tab label="Members">
						<div class="rs_head_srch input-group">
							<input type="text" class="form-control input-sm" placeholder="Typing ReferencedComponent Full Term" ng-model="m.refset.mbrSrch" ng-keyup="m.onKeyup(m.refset.mbrSrch, $event)"/>
							
							<!-- 검색, 페이지 버튼 -->
							<div class="input-group-btn">
								<!-- 검색 버튼 -->
								<button type="button" class="btn btn-sm btn-default glyphicon glyphicon-search" ng-click="m.search(m.refset.mbrSrch, 0, 25)"></button>
								
								<!-- 페이지 버튼 -->
								<!-- 이전 페이지 버튼: 첫 번째 페이지인 경우 disabled클래스 적용 -->
								<button type="button" class="btn btn-sm btn-default glyphicon glyphicon-menu-left" ng-class="{'disabled': m.refset.crntPage === 0}" ng-click="m.refset.crntPage > 0 ? m.previousPage(m.refset.crntPage):''"></button>
								
								<span class="btn btn-sm btn-default">{{ m.refset.crntPage + 1 | number }} / {{ m.refset.totalPage | number }} ({{ m.refset.totalCount | number }})</span>
								
								<!-- 다음 페이지 버튼: 마지막 페이지인 경우 disabled클래스 적용 -->
								<button type="button" class="btn btn-sm btn-default glyphicon glyphicon-menu-right" ng-class="{'disabled': m.refset.crntPage + 1 === m.refset.totalPage}" ng-click="m.refset.crntPage + 1 < m.refset.totalPage ? m.nextPage(m.refset.crntPage):''"></button>
							</div>
							
						</div>
						<div class="loading-indicator" ng-if="m.refset.loadingMbrs">
							<div class="spinner"></div>
						</div>
						<div id="re-m-mbrs" class="treeTable" style="overflow:auto" ng-show="!m.refset.loadingMbrs">
							
							<div class="tr" style="background-color:#eee" ng-if="rs.viewSrch">
								<div class="td tcol0">
									<div class="celldiv">
										<span>Candidate Members</span>
									</div>
								</div>
							</div>
							<div class="tr" ng-if="rs.viewSrch && m.candidateMbrs.length === 0">
								<div class="td tcol-100">
									<div class="celldiv" style="text-align:center">empty</div>
								</div>
							</div>
							
							<!-- 후보 멤버 목록 -->
							<div class="tr yellow" ng-repeat="nm in subtypes = m.candidateMbrs | orderBy:'term'" ng-if="rs.viewSrch" ng-include="'resources/template/refset/simpleMbrLst.html'"></div>
							
							<div class="tr" style="background-color:#eee" ng-if="rs.viewSrch">
								<div class="td tcol0">
									<div class="celldiv">
										<span>Members</span>
									</div>
								</div>
							</div>
							<div class="tr" ng-if="rs.viewSrch && m.mbrs.length === 0">
								<div class="td tcol-100">
									<div class="celldiv" style="text-align:center">empty</div>
								</div>
							</div>
							<!-- 현재 멤버 목록 -->
							<div class="tr" ng-repeat="nm in subtypes = m.mbrs | orderBy:'term'" ng-include="'resources/template/refset/simpleMbrLst.html'"></div>
							
							<!-- 
							검색 결과
							<div>
							{{m.srchRslts}}
							</div>
							 -->
							<!-- 
							<div class="tr" ng-repeat="member in m.members">
								Column0: ConceptTypeIcon & Term 
								<div class="td tcol0">
									<div class="celldiv">
										<div class="grad"></div>
										 <span class="glyphicon glyphicon-triangle-right"></span>
										<span>
											<i class="badge alert-warning" ng-bind-html="'&nbsp;&nbsp;'"></i>
											<a
												ui-sref="refset.editor.member"
												ng-bind="member.term"></a>
										</span>
									</div>
								</div>
								 Column1: Buttons 
								<div class="td tcol2">
									<button type="button" class="btn btn-xs btn-default" title="Inactive">
										<span class="glyphicon glyphicon-ban-circle"></span>
									</button>
								</div>
							</div>
							 -->
						</div>
					</md-tab>
				</md-tabs>
			</md-content>
		</div>
		<div class="p_splitter v_col" style="left:700px;"></div>
		<div class="p_slave v_col" style="left:707px;">
			<div style="display:none;position:absolute;top:0;left:0;height:100%;width:100%;z-index:100;background-color:#ffffff">
				<div class="thumbnail">
					<img></img>
					<div class="caption">
						<h3>FSN</h3>
						<p>description</p>
						<p><button class="btn btn-primary btn-xs" onclick="window.open('http://terminology.infoclinic.co/#/browser/snomedct/hierarchy/62479008', 'win', '')">details</button></p>
					</div>
				</div>
			</div>
			
			<md-content>
				<md-tabs md-border-bottom>
					<md-tab label="Properties">
						<div ng-include="'resources/template/refset/field.html'"></div>
					</md-tab>
				</md-tabs>
			</md-content>
			
		</div>
	</div>
</div>
