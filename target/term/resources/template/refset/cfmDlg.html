<!-- 목적: 레퍼런스세트 멤버 및 필드의 변경사항을 서버에 적용하기 전 최종 확인 -->
<md-dialog aria-label="Confirm" ng-controller="ConfirmDialogController as cdcVm">
	<form ng-cloak>
		<md-toolbar>
	      <div class="md-toolbar-tools">
	        <h2>Confirm Changes</h2>
	      </div>
	    </md-toolbar>
	    <md-dialog-content style="width:1000px">
	      <div class="md-dialog-content">
	      	<div class="row">
	      		<div class="col-sm-2">Refset ID</div>
	      		<div class="col-sm-10">{{cdcVm.refset.id}} | {{cdcVm.refset.name}} |</div>
      		</div>
      		<div class="row">
	      		<div class="col-sm-2">Module ID</div>
	      		<div class="col-sm-10">{{cdcVm.moduleId}} | moduleName |</div>
      		</div>
	      	
	      	<hr>
	      		신규 멤버
	      		<ul>
	      			<li ng-repeat="m in cdcVm.newMbrs">
	      				<span ng-bind="m.term"></span>
	      			</li>
	      		</ul>
	      	<hr>
	      		비활성화 멤버
	      		<ul>
	      			<li ng-repeat="m in cdcVm.inactMbrs">
	      				<span ng-bind="m.term"></span>
	      			</li>
	      		</ul>
	      	<hr>
	      		삭제 멤버
	      		<ul>
	      			<li ng-repeat="m in cdcVm.delMbrs">
	      				<span ng-bind="m.term"></span>
	      			</li>
	      		</ul>
	      	<hr>
	      	<div>
	      		<!-- Before Applying -->
	      		<div class="progress" ng-if="!cdcVm.applying && !cdcVm.error && !cdcVm.complete">
				  <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;">
				  </div>
				</div>
				<!-- Applying -->
				<div class="progress" ng-if="cdcVm.applying">
				  <div class="progress-bar progress-bar-info progress-bar-striped active" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" style="width: 100%">
				    <span class="sr-only">Applying</span>
				  </div>
				</div>
				<!-- After Applying -->
				<div class="progress" ng-if="cdcVm.complete || cdcVm.error">
				  <div class="progress-bar progress-bar-striped" ng-class="{'progress-bar-success':cdcVm.complete, 'progress-bar-danger':!cdcVm.complete && cdcVm.error}" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" style="width: 100%">
				    <span class="sr-only">Success</span>
				  </div>
				</div>
	      	</div>
	      	
	      </div>
	    </md-dialog-content>
	    
	    <md-dialog-actions layout="row">
	    	<button type="button" class="btn btn-sm btn-default" ng-click="cdcVm.close()" ng-disabled="cdcVm.complete || cdcVm.applying">Cancel</button>
	      <span flex></span>
	      <div class="btn-group">
	      	<button type="button" class="btn btn-sm" ng-class="{'btn-primary':!cdcVm.applying && !cdcVm.complete, 'btn-default':cdcVm.complete}" ng-click="cdcVm.apply()" ng-disabled="cdcVm.complete || cdcVm.applying">Apply</button>
      		<button type="button" class="btn btn-sm" ng-class="{'btn-primary': cdcVm.complete, 'btn-default':!cdcVm.complete}" ng-click="cdcVm.ok()" ng-disabled="!cdcVm.complete">OK</button>
      		</div>
	    </md-dialog-actions>
	</form>
</md-dialog>
