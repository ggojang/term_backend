<div>
  <div>
    <!-- 트리 화살표 -->
    <a class="glyphicon" ng-class="node.descendantCount === 0 ? 'glyphicon-minus':(!node.open ? 'glyphicon-chevron-right':(node.loading ? 'glyphicon-refresh icon-spin':'glyphicon-chevron-down'))" ng-click="node.descendantCount === 0 ? null:vm.getChildren(node)"></a>
    <!-- 컨셉 정의 상태 : Fully Defined | Primitive -->
    <span class="badge alert-warning" ng-bind-html="node.definitionStatus.id === '900000000000073002' ? '≡':'&nbsp;&nbsp;'">
		<md-tooltip md-direction="top">{{ node.definitionStatus.name }}</md-tooltip>
	</span>
    <!-- 컨셉 대표 용어 -->
    <a ui-sref="snomedctBrowser.concept({conceptId: node.conceptId})" ng-bind="node.term"></a>
    <!-- 자식을 포함한 자손 수 -->
    <span ng-if="node.descendantCount > 0">({{ node.descendantCount | number }})</span>
  </div>
  <ul style="padding-left: 10px;" ng-init="node.open = (node.conceptId === '138875005' ? true:false); node.loading=false" ng-show="node.open">
    <li style="white-space: nowrap;" ng-repeat="node in node.children | orderBy:'term'" ng-include="'resources/template/tree.html'">
    </li>
  </ul>
</div>
