
<div class="td tcol0">
 <div class="celldiv">
 	<div class="grad"></div>
 	<a
 		class="glyphicon" 
 		ng-class="n.descendantCount === 0 ? 'glyphicon-minus':(!n.open ? 'glyphicon-triangle-right':(n.loading ? 'glyphicon-refresh icon-spin':' glyphicon-triangle-bottom'))"
 		ng-click="n.descendantCount === 0 ? null:rss.getChildren(n)"></a>
 	<input type="checkbox" ng-model="n.checked" />
 	<span>
 		<i class="badge alert-warning" title="n.definitionStatus.name" ng-bind-html="n.definitionStatus === 'Defined' ? '≡':'&nbsp;&nbsp;'"></i>
 		<span ng-bind="n.term" title="{{ n.term }}"></span>
 	</span>
 </div>
</div>
<div class="td tcol2">
	<div class="celldiv">
		<span
			class="label label-primary"
			ng-if="::n.descendantCount > 0"
			ng-bind="n.descendantCount">
		</span>
	</div>
	
</div>
<div
  class="treeTable"
  ng-if="n.children.length > 0"
  ng-init="n.open = ( n.open ? true: (n.conceptId == '138875005' ? true:false)); n.loading=false;path= n.path + '~' + n.conceptId"
  ng-show="n.open">
  <div
  	class="tr"
  	ng-class="{'disabled': n.disabled}"
  	ng-init="n.path=path"
    ng-repeat="n in n.children | orderBy:'term'"
    ng-include="'resources/template/checkableTree.html'">
  </div>
</div>
