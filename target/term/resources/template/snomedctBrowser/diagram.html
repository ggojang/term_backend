

<md-dialog aria-label="Concept Diagram">
  <form>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>Concept Diagram</h2>
      </div>
    </md-toolbar>
    <md-dialog-content>
      <div class="md-dialog-content">
        <diagram source="diagramVm.source"></diagram>
      </div>
    </md-dialog-content>
    <md-dialog-actions layout="row">
      <md-button ng-click="diagramVm.saveAsPng()">
        {{ "saveAsPng" | translate }}
      </md-button>
      <md-button ng-click="diagramVm.hide()">
        {{ "close" | translate }}
      </md-button>
    </md-dialog-actions>
  </form>
</md-dialog>
