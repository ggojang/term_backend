<div id="sctb-concept" class="sctb-cnpt" layout-fill ng-controller="BrowserConceptController as vm">
    <ic-loading loading="vm.loading" target="#sctb-concept"></ic-loading>
	<v-accordion class="vAccordion--default" multiple>
		<!-- Definition -->
		<v-pane expanded="true" ng-if="vm.component.concept.conceptId.length > 0">
			<v-pane-header>{{ "browser.definition" | translate }}</v-pane-header>
			<v-pane-content ng-class="{'danger': !vm.component.concept.active}">
				<div class="panel panel-nostyle sctb-cnpt-def">
					<div class="panel-body">
						<!-- Relationship -->
						<div class="btn-group pull-right">
							<button type="button" class="btn btn-default btn-xs" ng-click="vm.showDiagram()">{{ "browser.diagram" | translate }}</button>
						</div>
						<div ng-if="vm.component.concept.conceptId != null">
							<span class="badge alert-warning" ng-bind-html="vm.getDefinitionStatusFlagValue(vm.component.concept.definitionStatus.id)">
								<md-tooltip md-direction="top">{{ vm.getDefinitionStatusName(vm.component.concept.definitionStatus.id) }}</md-tooltip>
							</span>
							<h5>
								<span ng-bind-html="vm.component.concept.conceptId + ' | ' + vm.component.concept.term + ' |'"></span>
							</h5>
						</div>
					
						<relationship concept="vm.component.concept" relationships="vm.component.relationships" select="vm.select(relGroup, isChangeView)"></relationship>
						<!-- Relationship END -->		
					</div>
				</div>
			</v-pane-content>
		</v-pane>
		<!-- Definition END -->
		
		<!-- Post-Coordinated Expression of Concept -->
		<v-pane expanded="true" ng-if="vm.component.relationships.length > 0">
			<v-pane-header>{{ "browser.postexpr" | translate }}</v-pane-header>
			<v-pane-content ng-class="vm.isActiveIcon(vm.component.concept.active)">
				<div class="panel panel-default">
					<div class="panel-body">
						<expression relationships="vm.component.relationships"></expression>
					</div>
				</div>	
			</v-pane-content>
		</v-pane>
		<!-- Post-Coordinated Expression of Concept END -->

		<!-- Description -->
		<v-pane id="sctb-description" expanded="true" ng-if="vm.component.descriptions.length > 0">
			<v-pane-header>{{ "browser.description" | translate }}</v-pane-header>
			<v-pane-content>

				<!--<div ic-crud-table server-url="http://api.infoclinic.com"></div>-->
				<description concept-id="{{vm.component.concept.id}}" descriptions="vm.component.descriptions"></description>
			</v-pane-content>
		</v-pane>
		<!-- Description END-->

		<!-- ReferenceSet -->
		<v-pane expanded="true" ng-if="vm.component.referencesets.length > 0">
			<v-pane-header>
				{{ "browser.refsets" | translate }}
			</v-pane-header>
			<v-pane-content>
				<div ng-include="'resources/template/snomedctBrowser/referenceset.html'" ng-show="vm.component.referencesets.length > 0"></div>
			</v-pane-content>
		</v-pane>
		<!-- ReferenceSet END -->

		<!-- History -->
		<v-pane expanded="true" ng-if="vm.component.histories.concept.length > 0 || vm.component.histories.descriptions.length > 0">
			<v-pane-header>{{ "browser.history" | translate }}</v-pane-header>
			<v-pane-content>
				<div ng-include="'resources/template/snomedctBrowser/history.html'"></div>
			</v-pane-content>
		</v-pane>
		<!-- History END -->

	</v-accordion>	

</div>
