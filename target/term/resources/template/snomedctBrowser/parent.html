<div id="sctb-parents" layout-fill ng-controller="BrowserParentController as parentVm">

	<ic-loading loading="parentVm.loading" target="#sctb-parents"></ic-loading>
	
    <ul style="padding:0">
    	<li style="white-space:nowrap" ng-repeat="node in parentVm.parents | orderBy:'term'" ng-include="'resources/template/snomedctBrowser/parentTree.html'"></li>
    	<li ng-if="parentVm.parents.length === 0" style="text-align:center;height:20px;line-height:20px;">
    		<span style="color:#525960">{{ 'browser.message.noparents' | translate }}</span>
    	</li>
    </ul>
</div>
