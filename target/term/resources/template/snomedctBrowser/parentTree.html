<div>
	<div>
		<!-- 트리 화살표 -->
		<a class="glyphicon" ng-class="node.conceptId === '138875005' ? 'glyphicon-minus':(!node.open ? 'glyphicon-chevron-right':(node.loading ? 'glyphicon-refresh icon-spin':'glyphicon-chevron-down'))" ng-click="node.conceptId === '138875005' ? null:parentVm.getParentList(node)"></a>
		<!-- 컨셉 정의 상태 : Fully Defined | Primitive -->
		<span class="badge alert-warning" ng-bind-html="parentVm.getDefinitionStatusFlagValue(node.definitionStatus.id)">
			<md-tooltip md-direction="top">{{ parentVm.getDefinitionStatusName(node.definitionStatus.id) }}</md-tooltip>
		</span>
		<!-- 컨셉 대표 용어 -->
		<a ui-sref="snomedctBrowser.concept({conceptId: node.conceptId})" ng-bind="parentVm.termBeautifier(node.term)"></a>
	</div>
	<ul ng-init="node.open=false; node.loading=false" ng-show="node.open">
		<li ng-repeat="node in node.parents | orderBy:'term'" ng-include="'resources/template/snomedctBrowser/parentTree.html'"></li>
	</ul>
</div>
