<div id="sctb-children" layout-fill ng-controller="BrowserChildrenController as vm">

    <ic-loading loading="vm.loading" target="#sctb-children"></ic-loading>
	
	<!-- Children -->
    <ul style="padding:0;">
    	<li ng-repeat="node in vm.children | orderBy:'term'" ng-include="'resources/template/snomedctBrowser/childrenTree.html'"></li>
    	<li ng-if="vm.children.length === 0" style="text-align:center;height:20px;line-height:20px;">
    		<span style="color:#525960">{{ 'browser.message.nochildren' | translate }}</span>
    	</li>
    </ul>
	<!-- Children END -->
</div>
