<div id="sctb-qualifiers" layout-fill ng-controller="BrowserQualifierController as bqVm">

	<ic-loading loading="bqVm.loading" target="#sctb-qualifiers"></ic-loading>
	
	<div ng-repeat="qualifier in bqVm.qualifiers | orderBy: 'name'">
		<!-- 화살표 -->
		<a ng-click="bqVm.toggleQualifier(qualifier);">
        	<i class="glyphicon" ng-class="qualifier.show ? 'glyphicon-chevron-down':'glyphicon-chevron-right'"></i>
			<span>{{ ::qualifier.name }}</span>
        </a>
        <!-- 화살표 종료 -->
        <div style="margin-left:10px;margin-top:5px;" ng-show="qualifier.used || qualifier.show ? (qualifier.show = true) : qualifier.show">
			<div ng-if="!qualifier.used" ng-repeat="range in qualifier.ranges">
    			<a ng-click="bqVm.getRangeValue(range.id)">
					<i class="glyphicon glyphicon-minus"></i>
                	<span>{{::range.name}}</span>
              	</a>
              	<div style="position:relative" ng-if="range.id == bqVm.activeRangeId"></div>
            </div>
            <div ng-if="qualifier.used">
				<a style="margin-left:10px;color:#086d11;font-weight:700;font-size:13px;" ng-click="bqVm.getRangeValue(qualifier.defref.destination.id);">
					= {{::qualifier.defref.destination.term}}
              	</a>
                <div ng-if="qualifier.defref.destination.id == bqVm.activeRangeId" style="position:relative"></div>
            </div>
        </div>
	</div>
	
	<div ng-if="!bqVm.loading && bqVm.qualifiers.length === 0" style="position:relative;top:20%;text-align:center;">
		<span style="color:#525960">{{ 'browser.message.noqualifiers' | translate }}</span>
	</div>
	
</div>
