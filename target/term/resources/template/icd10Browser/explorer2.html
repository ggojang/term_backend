<div class="icd10b-expr" ng-controller="Explorer2Controller as epVm" style="position:relative">

	<ic-loading loading="epVm.srchLoading" target=".icd10b-expr"></ic-loading>
	
	<div class="lb-srch-box">
	  <div class="input-group">
	      <input id="lb-srch-input" type="text" class="form-control input-sm" name="x" placeholder="Search term..." ng-model="epVm.srch" ng-keyup="epVm.onKeyUp($event)" ng-focus="epVm.onFocus($event)">
	      <span class="input-group-btn">
	          <button class="btn btn-sm btn-default" type="button" ng-click="epVm.search(epVm.srch)"><span class="glyphicon glyphicon-search"></span></button>
	      </span>
	  </div>
	  <div class="lb-srch-autoframe" ng-if="epVm.srchFocus" ng-switch on="epVm.getAutoframeViewName()">
	  	<div ng-switch-when="suggest" style="min-height:100px;">자동완성이 들어가는 자리</div>
 		<div ng-switch-when="history" style="overflow:hidden;">
	  		<div class="list-group" style="min-height:73px;max-height: 300px;overflow-y: auto;overflow-x: hidden;margin:0">
	  			<span style="display:block;line-height:72px;text-align:center;" ng-if="epVm.srchHistories.length === 0">최근 검색어 내역이 없습니다.</span>
	  			<a class="list-group-item" style="border-radius:0;padding:5px 5px;" ng-repeat="h in epVm.srchHistories | orderBy: '-' track by $index" ng-click="epVm.srch = h.data;epVm.search(epVm.srch)">
	  				<div class="row" style="margin:0">
						<div class="col-sm-7" style="text-overflow: ellipsis;overflow: hidden;padding:0 5px">{{ h.data }}</div>
						<div class="col-sm-5 text-muted" style="text-align:right;padding:0 5px"><em>{{ h.time | timeago }}</em></div>
					</div>
	  			</a>
	  		</div>
			<p class="func" ng-class="{'disabled': epVm.srchHistories.length === 0}"><span><a ng-click="epVm.srchHistories.length > 0 ? epVm.removeSearchHistoryAll():''">기록 삭제</a></span></p>
			
	  	</div>
	  </div>
	  <!-- 검색 창 종료 -->
	</div>
	
	<div class="lb-srch-msg" ng-switch on="epVm.srchCall">
		<div ng-switch-when="true">
			<span ng-if="epVm.srchRslts.length > 0">검색결과 {{ epVm.srchTotalSize | number }}개 중 {{ epVm.srchRslts.length | number }}개</span>
			<span ng-if="epVm.srchRslts.length === 0">"{{ epVm.srchHistories[epVm.srchHistories.length - 1].data }}"와(과) 일치하는 검색결과가 없습니다.</span>
			
  			<button class="btn btn-xs btn-default" ng-click="epVm.clear()">검색 초기화</button>
		</div>
		<!--
		<span ng-switch-default>총 80,868개</span>
		-->
	</div>
	
	<!-- Hierarchy & Search Result -->
	<div class="lb-srch-vw">
		<div class="lb-srch-tree" ng-show="!epVm.srchCall && epVm.srchRslts.length === 0">
			<ul style="padding-top:10px">
    			<li ng-repeat="node in epVm.tree" ng-include="'resources/template/icd10Browser/children.html'"></li>
  			</ul>
  		</div>
  		
  		<div class="lb-srch-results" ng-if="epVm.srchCall">
  			<ul class="list-group">
  				<li class="list-group-item" ng-repeat="rslt in epVm.srchRslts" ng-class="{'selected': epVm.isSelected(rslt.code)}" ui-sref="icd10Browser.code({ ver: '2016', code: rslt.code })">
  					<div class="row">
  						<div class="col-md-2 lb-srch-results-cd" title="{{rslt.code}}">{{ rslt.code }}</div>
  						<div class="col-md-10 lb-srch-results-label" title="{{rslt.label}}">[{{rslt.kind}}] {{ rslt.label }}</div>
  					</div>
  				</li>
 			</ul>
 			
 			<!-- Search More Results -->
  			<button type="button" class="btn btn-sm btn-success" style="width:100%" ng-if="epVm.srchRslts.length < epVm.srchTotalSize" ng-click="epVm.search(epVm.srch, true)">More ( {{ epVm.srchRslts.length }}  / {{ epVm.srchTotalSize }} )</button>
  		</div>
	</div>
	<!-- Hierarchy & Search Result END -->
</div>
