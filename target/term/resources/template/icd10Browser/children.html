<div style="font-size:10pt;display:flex">
<!-- 노드 상태 아이콘 시작 -->
  <div>
    <a class="glyphicon" ng-class="epVm.getArrowClass(node)" ng-click="epVm.getChildren(node)"> </a>
<!-- 노드 상태 아이콘 종료 -->
  </div>
  <div>
  	<a style="white-space:pre-wrap;font-weight:bold" ui-sref="icd10Browser.code({ ver: '2016', code: node.code })">{{node.code}} </a>
	
  </div>
  <div>
<!-- 선호용어/대표용어/표시되는용어 시작 -->
      <a style="white-space:pre-wrap" ui-sref="icd10Browser.code({ ver: '2016', code: node.code })">{{node.label}}</a>
 
 
<!-- 선호용어/대표용어/표시되는용어 종료 -->

<!-- 자손 수 시작 -->
    <span ng-if="node.descendantCount > 0">({{ node.descendantCount | number }})</span>
<!-- 자손 수 종료 -->
  </div>
</div>

<!-- 자식 목록 시작 -->
<ul ng-if="node.open">
	<li ng-repeat="node in node.children" ng-init="node.open=false" ng-include="'resources/template/icd10Browser/children.html'">
	</li>
</ul>
<!-- 자식 목록 종료 -->
