<div class="lncb-wrap">
	<!-- Navigation -->
	<nav class="main-nav" role="navigation">
		<md-content layout-fill>
			<md-tabs md-border-bottom>
				<md-tab label="{{ 'browser.explore' | translate }}">
					<md-tab-content ng-include="'resources/template/loincBrowser/explorer.html'"></md-tab-content>
				</md-tab>
			</md-tabs>
		</md-content>
	</nav>
	<!-- Navigation END -->
	
	<!-- Main -->
	<section class="main-content" role="main">
		<md-content layout-fill>
			<md-tabs md-border-bottom>
				<md-tab label="{{ 'browser.detail' | translate }}">
<!--
					<md-tab-content layout-fill ui-view> 
						<div class="lb-intro" ng-include="'resources/template/loincBrowser/entity.html'"></div>
					</md-tab-content>
-->					<md-tab-content layout-fill ui-view>

						<div class="lb-intro">
							<img src="resources/images/loinc-logo-tmp.png">
							<br><br><br>
							<h1>LOINC v2.67</h1>
							<br>	
							<h4>Released: 2019-12-13</h4>
							
							<br><br>
							
							<h4>License from Regenstrief Institute, Inc. </h4>
						</div>
					</md-tab-content>
				</md-tab>
			</md-tabs>
		</md-content>
	</section>
	<!-- Main END -->

	<!-- Aside -->
	<aside class="main-sidebar" role="complementary" style="display:none">
		<md-content layout-fill>
			<md-tabs md-border-bottom md-selected="0">
				<md-tab label="{{ 'loinc.panel' | translate }}">
					<md-tab-content id="lncb-batteries" ng-controller="PanelController as panelVm">
						<ic-loading loading="panelVm.loading" target="#lncb-batteries"></ic-loading>
						
						<p class="tree-line-root" ng-if="panelVm.isPanelType">{{panelVm.panel.code}} {{ panelVm.panel.name }}</p>
						<ul class="tree-line" ng-if="panelVm.isPanelType">
							<li ng-repeat="p in panelVm.panel.children | orderBy:'sequence'" ng-include="'resources/template/loincBrowser/panelTree.html'"></li>
						</ul>
						<div ng-if="!panelVm.isPanelType" style="position:relative;top:20%;text-align:center;">
							<span style="color:#525960">{{ 'loinc.message.nopanel' | translate }}</span>
						</div>
						
					</md-tab-content>
				</md-tab>
			</md-tabs>
		</md-content>
	</aside>
	<!-- Aside END -->
</div>
