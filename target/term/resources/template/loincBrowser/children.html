<div style="display:flex">
  <div>
    <!-- 노드 상태 아이콘 시작 -->
    <a class="glyphicon" ng-class="epVm.getArrowClass(node)" ng-click="epVm.getChildren(node)"> </a>
    <!-- 노드 상태 아이콘 종료 -->
  </div>
  <div>
    <!-- 선호용어/대표용어/표시되는용어 시작 -->
    <a style="white-space:pre-wrap" ui-sref="loincBrowser.entity({ ver: 'v2.67', code: node.code })">{{ node.prefName }}</a>
    <!-- 선호용어/대표용어/표시되는용어 종료 -->

    <!-- 자손 수 시작 -->
    <span ng-if="node.desCnt > 0">({{ node.desCnt | number }})</span>
    <!-- 자손 수 종료 -->
  </div>
</div>


  <!-- 자식 목록 시작 -->
  <ul ng-if="node.open">
	<li ng-repeat="node in node.children" ng-init="node.open=false" ng-include="'resources/template/loincBrowser/children.html'">
	</li>
  </ul>
  <!-- 자식 목록 종료 -->
