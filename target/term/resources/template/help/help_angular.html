<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>STOM Help</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular.min.js"></script>
    <script src="js/help.js"></script>
    <link rel="stylesheet" type="text/css" href="css/help.css">

    <!--[if lt IE 9]>
        <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
</head>

<body class="body-screen">

<div class="wrap" ng-app="helpApp">

    <div class="top">
        <h1 class="title">InfoClinic STOM Browser &amp; APIs</h1>
    </div>

    <div class="menu">
        <nav class="{{active}}" ng-click="$event.preventDeafault()" style="text-align:center;">
            <a href="#here1" class="SNOMED CT Browser" ng-click="active='SNOMED CT Browser'">SNOMED CT Browser</a>
            <a href="#here2" class="LOINC Browser" ng-click="active='LOINC Browser'" >LOINC Browser</a>
            <a href="#here3" class="STOM APIs" ng-click="active='STOM APIs'">STOM APIs</a>

        </nav>
    </div>

    <div class="middle">
<!--
        <div class="navi">
            <nav class="naviVWrap" >
                <ul class="no-style">
                    <li>1. Top Mennu</li>
                    <li>2. Hierarchy</li>
                    <li>3. Overview</li>
                </ul>
            </nav>
        </div>
-->
        <div class="content" ng-controller="helpCtrl" >
            <div ng-switch on="active">
                <div ng-switch-when="SNOMED CT Browser">
                    <div class="html1" id="here1" ng-include="url" style="overflow:auto;">
                    </div>
                </div>
            <div ng-switch-when="LOINC Browser">
                <div class="html2" id="here2" style="overflow:auto;">
                    <p>LOINC Browser</p>
                </div>
            </div>
            <div ng-switch-when="STOM APIs">
                <div class="html3" id="here3" style="overflow:auto;">
                    <p>STOM APIs</p>
                </div>
            </div>
            <div ng-switch-default>
            </div>
        </div>

    </div>
</div>
<!--
 <div class="foot">
        </div>

    </div>
</div>
-->

<script src="http://code.angularjs.org/1.1.5//angular-resource.min.js"></script>

</body>
</html>
