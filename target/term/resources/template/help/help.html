<!DOCTYPE html>
<html>
<head lang="en">
    <title>STOM Help</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="./css/snomedct.css"></script>
<!--
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular.min.js"></script>
-->
    <!--[if lt IE 9]>
        <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
    
    <script>
        $(document).ready(function() {
            $("#snomedct_browser").load("./content/ko/snomedct.html");
            $("#navi").load("./content/ko/navi_snomedct.html");
         });
    </script>

</head>

<body>

<div class="wrap">
<!--
    <div class="container">
        <div class="jumbotron">
            <h1 class="title">InfoClinic STOM Browser &amp; APIs</h1>
        </div>
    </div>
or
    <div class="container">
        <div class="page-header">
            <h1 class="title">InfoClinic STOM Browser &amp; APIs</h1>
        </div>
    </div>
-->
    <div class="container">
        <nav class="navbar navbar-inverse">
            <div class="navbar-header">
                <a class="navbar-brand" href="#" target="_blank">STOM HELP</a>
            </div>

            <ul class="nav navbar-nav">
                <li><a href="#snomedct_browser">SNOMED CT Browser</a></li>
 <!--
                <li><a href="#loinc_browser">LOINC Browser</a></li>
                <li><a href="#stom_apis">STOME APIs</a></li>
 -->
            </ul>
            <ul class="nav navbar-nav navbar-right" style="margin-right:0;">
                <li class="dropdown">
                    <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                        <span id="menu_lang"></span>
                        <span class="caret"></span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a id="hangeul" href="#">한글</a></li>
                        <li><a id="english" href="#">English</a></li>
                    </ul>
                </li>

            </ul>
        </nav>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-sm3 col-md-3 col-lg-3">
                <div id="navi" style="padding:20px 0 0 0;" >
                </div>
            </div>
            <div class="col-sm9 col-md-9 col-lg-9" style="border-left:1px solid;">
                <div id="snomedct_browser" style="overflow:auto;">
                </div>
<!--                
                <div id="loinc_browser" style="overflow:auto;">
                </div>
                <div id="stom_apis" style="overflow:auto;">
                </div>
-->
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    userLang = navigator.language || navigator.userLanguage;
    if (userLang == "ko" || userLang == "ko-kr" || userLang == "ko-KR")
        userLang = "한글";
    else if (userLang == "en" || userLang == "eu-en" || userLang == "eu-EN")
        userLang = "English";
    document.getElementById("menu_lang").innerHTML = userLang;
    
    $("#hangeul").click(function() {
        document.getElementById("menu_lang").innerHTML = "한글";
        $("#snomedct_browser").load("content/ko/snomedct.html");
        $("#navi").load("./content/ko/navi_snomedct.html");
    });
    $("#english").click(function() {
        document.getElementById("menu_lang").innerHTML = "English";
        $("#snomedct_browser").load("content/en/snomedct_en.html");
        $("#navi").load("./content/en/navi_snomedct_en.html");
    });
    
</script>
</body>
</html>
