<div ng-controller="ConceptLeftController">
	<!-- a ui-sref="concept.modify({editMode:'create',targetId:'62479008'})">CONCEPT : 62479008</a  -->
	<div style="padding:5px 3px;">
		<div class="input-group input-group-sm" ng-class="keywordClass" ng-init="errorMsg=('concept.search.error' | translate);warningMsg=('search.message.notfound' | translate)">
			<div class="input-group-btn">
				<button type="button" class="btn btn-default dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" disabled>Inferred <span class="caret"></span></button>
				<ul class="dropdown-menu">
					<li><a ng-click="">Inferred</a></li>
					<li><a ng-click="">Stated</a></li>
				</ul>
			</div>
			<input type="text" name="chtSrchWord" ng-model="chtSrchWord" ng-focus="keywordClass='';chtSrchWord=''" ng-enter="goSearch($event)" class="form-control" aria-label="..." placeholder="Search for...">
			<span class="input-group-btn">
        		<button class="btn btn-default" type="button" ng-click="goSearch($event)"><span class="glyphicon glyphicon-search" aria-hidden="true"></span></button>
      		</span>
		</div>
	</div>
	<div style="padding:5px 3px;overflow:auto;">
		<script type="text/ng-template" id="/conceptHeirarchyTree.html">
			<a class="glyphicon" ng-class="node.descendantCount === 0 ? 'glyphicon-minus':(!node.open ? 'glyphicon-chevron-right':(node.loading ? 'glyphicon-refresh icon-spin':'glyphicon-chevron-down'))" ng-click="node.descendantCount === 0 ? null : getChildren(node)"></a>
			<span class="badge alert-warning" ng-bind-html="getDefinitionStatusFlagValue(node.definitionStatus.id)"><md-tooltip md-direction="top">{{ getDefinitionStatusName(node.definitionStatus.id) }}</md-tooltip></span>
			<a ui-sref="concept.modify({editMode:'child',targetId:node.conceptId})">{{termBeautifier(node.term)}}</a>
			<span ng-if="node.descendantCount > 0">( {{node.descendantCount | number}} )</span>
			<ul style="padding-left:10px;" ng-init="node.loading=false" ng-show="node.open">
				<li ng-repeat="node in node.children | orderBy:'term'" ng-include="'/conceptHeirarchyTree.html'"></li>
			</ul>
		</script>
		<ul id="tree-root" style="padding: 0">
			<li ng-if="CHT.length > 0">
				<span class="glyphicon glyphicon-chevron-down"></span>
				<span class="badge alert-warning">&nbsp;&nbsp;</span>
				<span>{{CHT[0].term}}</span>
				<span>( {{CHT[0].descendantCount | number}} )</span>
				<ul style="padding-left:10px;">
					<li ng-repeat="node in CHT[0].children | orderBy:'term'" ng-include="'/conceptHeirarchyTree.html'"></li>
				</ul>
			</li>
		</ul>
	</div>
</div>
