<md-dialog aria-label="{{ 'concept.dialog.parent.tit' | translate }}"  ng-cloak>
	<form>
		<md-toolbar>
			<div class="md-toolbar-tools">
				<h3>{{ 'concept.dialog.parent.tit' | translate }}</h3>
			</div>
		</md-toolbar>
		<md-dialog-content>
			<div class="md-dialog-content" style="min-height:100px;min-width:600px;">
				<table class="table table-striped" style="float:left;width:50%;">
					<thead>
						<tr>
							<th></th>
							<th>Inferred Relations</th>
						</tr>
					</thead>
					<tbody>
						<tr ng-repeat="concept in inferredConcepts | filter:{ active:true }">
							<td><span class="badge" ng-class="concept.cType.type == 'F' ? 'ce-fullydefined' : ''" title="{{concept.cType.name}}">{{concept.cType.type}}</span></td>
							<td>{{concept.destination.conceptId}} | {{ concept.destination.term}}</td>
						</tr>
					</tbody>
				</table>
				<table class="table table-striped" style="float:left;width:50%;">
					<thead>
						<tr>
							<th></th>
							<th>Stated Relations</th>
						</tr>
					</thead>
					<tbody>
						<tr ng-repeat="concept in statedConcepts | filter:{ active:true }">
							<td><span class="badge" ng-class="concept.cType.type == 'F' ? 'ce-fullydefined' : ''" title="{{concept.cType.name}}">{{concept.cType.type}}</span></td>
							<td>{{concept.destination.conceptId}} | {{ concept.destination.term}}</td>
						</tr>
					</tbody>
				</table>
				<ce-loading loading="dialogLoaded" target=".md-dialog-content"></ce-loading>
			</div>
		</md-dialog-content>
		<md-dialog-actions layout="row">
			<button type="button" class="btn btn-primary btn-sm" ng-click="ok()" style="margin-right:10px;">{{ 'concept.dialog.concept.btn.ok' | translate }}</button>
		</md-dialog-actions>
	</form>
</md-dialog>
