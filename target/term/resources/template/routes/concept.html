<concept-layout>
	<div class="outer-west">
		<md-content>
			<md-tabs md-border-bottom>
	        	<md-tab label="{{ 'concept.panel.left.tit' | translate }}">
	        		<div ng-include="templateUrl.left"></div>
				</md-tab>
			</md-tabs>
		</md-content>
		<ce-loading loading="loaded" target=".outer-west"></ce-loading>
	</div>
	<div class="outer-center">
		<div style="position:relative;">
			<div class="fa">
				<table>
					<tbody>
						<tr>
							<td class="fa-border"></td>
							<td colspan="3" class="fa-tit fa-border">Temporary</td>
							<td colspan="2" class="fa-tit fa-border">Relation</td>
						</tr>
						<tr>
							<td class="fa-border">
								<button type="button" class="btn btn-default fa-btn" title="Apply" ng-disabled="funcBtn.apply.disabled"><span class="glyphicon glyphicon-floppy-saved" aria-hidden="true"></span></button>
							</td>
							<td class="fa-border">
								<button type="button" class="btn btn-default fa-btn" title="Save" ng-disabled="funcBtn.save.disabled"><span class="glyphicon glyphicon-saved" aria-hidden="true"></span></button>
							</td>
							<td>
								<button type="button" class="btn btn-default fa-btn" title="Load data" ng-disabled="funcBtn.load.disabled"><span class="glyphicon glyphicon-download-alt" aria-hidden="true"></span></button>
							</td>
							<td>
								<button type="button" class="btn btn-default fa-btn" title="Delete" ng-disabled="funcBtn.del.disabled"><span class="glyphicon glyphicon-trash" aria-hidden="true"></span></button>
							</td>
							<td class="fa-border">
								<button type="button" class="btn btn-default fa-btn" title="Stated" ng-click="relationStated()" ng-disabled="funcBtn.stated.disabled">Stated</button>
							</td>
							<td>
								<button type="button" class="btn btn-default fa-btn" title="Inferred" ng-click="relationInferred()" ng-disabled="funcBtn.inferred.disabled">Inferred</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
		<md-content>
			<md-tabs md-border-bottom>
				<md-tab label="{{ 'concept.panel.center.tab1.tit' | translate }}">
					<div ng-include="templateUrl.tab1"></div>
				</md-tab>
				<md-tab label="{{ 'concept.panel.center.tab2.tit' | translate }}">
					<div ng-include="templateUrl.tab2"></div>
				</md-tab>
			</md-tabs>
		</md-content>
		<ce-loading loading="conceptDetailLoaded" target=".outer-center"></ce-loading>
	</div>
	<div class="outer-south">
		<table style="width:100%;height:100%;background:#fff;table-layout:fixed;">
			<tbody>
				<tr style="height:100%;">
					<td style="vertical-align:top;">
						<div style="width:100%;height:calc(100% + 13px);overflow:auto;padding: 6px;border-radius: 3px;background-color: #f5f5f5;border: 1px solid #e3e3e3;box-shadow: inset 0 1px 1px rgba(0,0,0,.05);">
							<ul style="margin-bottom:0;padding-left:15px;">
								<li ng-repeat="log in logMessage track by $index">{{log}}</li>
							</ul>
						</div>
					</td>
					<td style="width:30px;vertical-align:top;">
						<button type="button" class="btn btn-default fa-btn" ng-click="clearLog()" title="clear"><span class="glyphicon glyphicon-erase" aria-hidden="true"></span></button>
					</td>
				</tr>
			</tbody>
		</table> 
	</div>
